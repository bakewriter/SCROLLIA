<html lang="ja">
<head>
<meta charset="UTF-8">

<title>SCROLLIA</title>
<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection,
    addDoc, query, orderBy, limit, serverTimestamp, updateDoc, where, getDocs, deleteDoc }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAZZ7q4EmNRQ00PPUxV2JkEXW9snEnQGq8",
    authDomain: "scrollia-6691b.firebaseapp.com",
    projectId: "scrollia-6691b",
    storageBucket: "scrollia-6691b.firebasestorage.app",
    messagingSenderId: "564912987428",
    appId: "1:564912987428:web:88b81ab7ecbfca5768e7b1",
    measurementId: "G-T6THQ7D4WB"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  window._fb = { auth, db, provider, signInWithPopup, signOut, onAuthStateChanged,
    doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, orderBy, limit,
    serverTimestamp, updateDoc, where, getDocs, deleteDoc };

  onAuthStateChanged(auth, (user) => {
    window._fbUser = user;
    if (typeof window.onFirebaseAuthChanged === 'function') {
      window.onFirebaseAuthChanged(user);
    }
  });
</script>
<style>
  :root {
    --bg: #0d0d14;
    --bg2: #13131f;
    --bg3: #1a1a2e;
    --panel: #16162a;
    --border: #2a2a4a;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --purple: #7b5ea7;
    --purple2: #a07cd0;
    --red: #c0392b;
    --green: #27ae60;
    --blue: #2980b9;
    --cyan: #16a085;
    --text: #e8e0d0;
    --text2: #a09080;
    --text3: #6a5a50;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif; font-size: 14px; min-height: 100vh; display: flex; gap: 0; }
  #debug-panel { display: none; }
  #debug-panel-header { padding: 6px 8px; background: #1a0a0a; border-bottom: 1px solid #e74c3c44; color: #e74c3c; font-size: 11px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
  #debug-panel-body { flex: 1; overflow-y: auto; padding: 4px; font-size: 10px; font-family: monospace; color: #e74c3c; }
  #debug-panel-body div { padding: 2px 2px; border-bottom: 1px solid #1a0a0a; word-break: break-all; }
  #debug-panel-body div.warn { color: #f39c12; }
  #debug-panel-body div.error { color: #ff4444; font-weight: bold; }
  #debug-panel-body div.info { color: #7fb3d3; }
  #app { max-width: 700px; margin: 0 auto; padding: 0 0 60px; width: 100%; }

  #header { background: linear-gradient(135deg, #0a0a18 0%, #1a0a2e 50%, #0a0a18 100%); border-bottom: 2px solid var(--gold); padding: 10px 16px; text-align: center; position: relative; overflow: hidden; }
  #header::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(201,168,76,0.03) 40px, rgba(201,168,76,0.03) 41px); pointer-events: none; }
  #logo { height: 90px; display: block; margin: 0 auto; position: relative; z-index: 1; }

  #statusbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 6px 12px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .stat-chip { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; font-size: 12px; white-space: nowrap; }
  .stat-chip span { color: var(--gold); font-weight: bold; }

  #nav { background: var(--bg2); border-bottom: 2px solid var(--border); display: flex; flex-wrap: wrap; }
  .nav-btn { flex: 1; min-width: 60px; padding: 8px 4px; background: none; border: none; color: var(--text2); cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.15s; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .nav-btn:hover { color: var(--text); background: rgba(201,168,76,0.05); }
  .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(201,168,76,0.08); }

  #content { padding: 12px; }
  .screen { display: none; }
  .screen.active { display: block; }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 10px; }
  .panel-title { color: var(--gold); font-size: 13px; font-weight: bold; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .btn { display: inline-block; padding: 7px 14px; border-radius: 4px; border: 1px solid; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.15s; text-align: center; }
  .btn-gold { background: rgba(201,168,76,0.15); border-color: var(--gold); color: var(--gold); }
  .btn-gold:hover { background: rgba(201,168,76,0.25); }
  .btn-red { background: rgba(192,57,43,0.15); border-color: var(--red); color: #e74c3c; }
  .btn-red:hover { background: rgba(192,57,43,0.25); }
  .btn-green { background: rgba(39,174,96,0.15); border-color: var(--green); color: #2ecc71; }
  .btn-green:hover { background: rgba(39,174,96,0.25); }
  .btn-blue { background: rgba(41,128,185,0.15); border-color: var(--blue); color: #3498db; }
  .btn-blue:hover { background: rgba(41,128,185,0.25); }
  .btn-purple { background: rgba(123,94,167,0.15); border-color: var(--purple); color: var(--purple2); }
  .btn-purple:hover { background: rgba(123,94,167,0.25); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .town-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .town-card { background: linear-gradient(135deg, #1e1a2e 0%, #16162a 100%); border: 1px solid var(--border); border-radius: 6px; padding: 12px 8px; cursor: pointer; transition: all 0.15s; text-align: center; min-height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .town-card:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }
  .town-card .icon { font-size: 22px; margin-bottom: 2px; }
  .town-card .name { color: var(--gold); font-weight: 900; font-size: 14px; white-space: nowrap; }
  .town-card .desc { color: var(--text2); font-size: 11px; margin-top: 2px; white-space: nowrap; }

  .area-card { background: linear-gradient(135deg, #1e1a2e 0%, #16162a 100%); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.15s; }
  .area-card:hover { border-color: var(--gold); }
  .area-card .area-icon { font-size: 24px; }
  .area-card .area-info { flex: 1; }
  .area-card .area-name { color: var(--gold); font-weight: 900; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .area-card .area-desc { color: var(--text2); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .area-card .area-lv { color: var(--text3); font-size: 10px; }

  .combat-top { display: flex; gap: 10px; margin-bottom: 10px; }
  .combatant { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 10px; text-align: center; }
  .combatant .c-name { font-weight: bold; margin-bottom: 4px; }
  .c-name.player { color: var(--gold); }
  .c-name.enemy { color: #e74c3c; }
  .hp-bar-wrap { background: #1a0a0a; border-radius: 3px; height: 8px; overflow: hidden; margin: 4px 0; }
  .hp-bar { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .hp-bar.player { background: linear-gradient(90deg, #27ae60, #2ecc71); }
  .hp-bar.enemy { background: linear-gradient(90deg, #c0392b, #e74c3c); }
  .c-hp { font-size: 12px; color: var(--text2); }
  .combat-log { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 8px; height: 110px; overflow-y: auto; margin-bottom: 10px; font-size: 12px; }
  .log-line { padding: 1px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .log-player { color: #2ecc71; }
  .log-ally   { color: #3498db; }
  .log-enemy  { color: #e74c3c; }
  .log-drop   { color: var(--gold); }
  .log-sys    { color: var(--text2); }
  .scroll-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
  .scroll-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 7px 5px; cursor: pointer; font-family: inherit; font-size: 11px; color: var(--text); transition: all 0.15s; text-align: center; }
  .scroll-btn:hover { border-color: var(--purple2); color: var(--purple2); }
  .scroll-btn .s-icon { font-size: 18px; display: block; }
  .scroll-btn .s-name { font-size: 10px; color: var(--text2); }
  .scroll-btn .s-count { color: var(--gold); font-size: 11px; }
  .scroll-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .combat-actions { display: flex; gap: 6px; }

  .shop-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .shop-item .si-icon { font-size: 20px; }
  .shop-item .si-info { flex: 1; }
  .shop-item .si-name { font-weight: bold; font-size: 13px; }
  .shop-item .si-desc { color: var(--text2); font-size: 11px; }
  .shop-item .si-price { color: var(--gold); font-size: 12px; margin-top: 2px; }

  .baz-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .baz-item .bi-icon { font-size: 20px; }
  .baz-item .bi-info { flex: 1; }
  .baz-item .bi-seller { color: var(--text2); font-size: 11px; }
  .baz-item .bi-price { color: var(--gold); font-weight: bold; }

  .npc-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .npc-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 10px; cursor: pointer; transition: all 0.15s; text-align: center; }
  .npc-card:hover { border-color: var(--purple2); }
  .npc-card.selected { border-color: var(--purple2); background: rgba(123,94,167,0.1); }
  .npc-card .npc-icon { font-size: 28px; }
  .npc-card .npc-name { font-size: 12px; color: var(--purple2); font-weight: bold; margin-top: 2px; }
  .chat-window { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 10px; height: 180px; overflow-y: auto; margin-bottom: 8px; }
  .chat-msg { margin-bottom: 8px; }
  .chat-msg .cm-name { font-size: 11px; font-weight: bold; margin-bottom: 2px; }
  .chat-msg .cm-name.npc { color: var(--purple2); }
  .chat-msg .cm-name.player { color: var(--gold); }
  .chat-msg .cm-text { background: var(--panel); border-radius: 4px; padding: 5px 8px; font-size: 12px; line-height: 1.5; }

  .stat-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .stat-row .sr-label { color: var(--text2); }
  .stat-row .sr-value { color: var(--gold); font-weight: bold; }
  .equip-slot { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 7px 10px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
  .equip-slot .es-slot { color: var(--text3); font-size: 11px; }
  .equip-slot .es-item { color: var(--text); font-size: 12px; }
  .equip-slot .es-btn { font-size: 11px; padding: 3px 7px; }

  .gem-store { text-align: center; padding: 20px; }
  .gem-store .gs-balance { font-size: 28px; color: var(--gold); margin-bottom: 16px; }
  .code-input-wrap { display: flex; gap: 6px; margin-bottom: 16px; }
  .code-input-wrap input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; color: var(--text); font-family: inherit; font-size: 13px; }
  .code-input-wrap input:focus { outline: none; border-color: var(--gold); }
  .placeholder-item { background: var(--bg3); border: 1px dashed var(--border); border-radius: 6px; padding: 16px; margin-bottom: 8px; text-align: center; color: var(--text3); font-size: 13px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; width: 320px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal-title { color: var(--gold); font-weight: bold; font-size: 15px; margin-bottom: 12px; }
  .modal label { color: var(--text2); font-size: 12px; display: block; margin-top: 8px; margin-bottom: 3px; }
  .modal input, .modal select { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 7px 9px; color: var(--text); font-family: inherit; font-size: 13px; }
  .modal input:focus, .modal select:focus { outline: none; border-color: var(--gold); }
  .modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }

  .sp-dung { text-align: center; padding: 10px; }
  .sp-dung .spd-info { color: var(--text2); font-size: 13px; margin-bottom: 12px; }
  .sp-dung .spd-remain { color: var(--gold); font-size: 18px; font-weight: bold; }

  .msg { padding: 8px 10px; border-radius: 4px; margin-bottom: 8px; font-size: 13px; }
  .msg-info { background: rgba(41,128,185,0.15); border: 1px solid rgba(41,128,185,0.3); color: #7fb3d3; }
  .msg-success { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.3); color: #7dcea0; }
  .msg-warn { background: rgba(243,156,18,0.15); border: 1px solid rgba(243,156,18,0.3); color: #f0b429; }
  .msg-err { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.3); color: #e74c3c; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .flex-end { display: flex; justify-content: flex-end; gap: 6px; }
  .mt8 { margin-top: 8px; }
  .section-title { color: var(--gold); font-size: 13px; font-weight: bold; margin: 12px 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .tag { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
  .tag-purple { background: rgba(123,94,167,0.3); color: var(--purple2); }
  .tag-gold { background: rgba(201,168,76,0.2); color: var(--gold); }
  .tag-red { background: rgba(192,57,43,0.25); color: #e74c3c; }

  @media(max-width:480px){
    .town-area { grid-template-columns: 1fr 1fr; }
    .scroll-grid { grid-template-columns: repeat(3,1fr); }
    .npc-list { grid-template-columns: 1fr 1fr; }
  }

  #login-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    padding-bottom: 40px;
  }
  #login-screen.show { display: flex; }
  #login-logo-wrap {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 24px;
  }
  #login-logo { width: 280px; max-width: 80vw; }
  #login-tagline { color: var(--text3); font-size: 13px; margin-top: 4px; letter-spacing: 2px; }
  #login-btn-wrap { width: 100%; max-width: 360px; padding: 0 24px; display: flex; flex-direction: column; gap: 12px; }
  .login-btn-google {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #fff; color: #1a1a1a; border: none; border-radius: 8px;
    padding: 14px 24px; font-size: 15px; font-weight: bold; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .login-btn-google:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  .login-btn-google img { width: 22px; height: 22px; }
  #login-info {
    width: 100%; max-width: 500px; padding: 0 24px; margin-top: 24px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .info-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px;
  }
  .info-card-title { color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 6px; }
  .info-card-body { color: var(--text2); font-size: 12px; line-height: 1.7; }
  #login-ad-zone {
    width: 100%; max-width: 500px; padding: 0 24px; margin-top: 16px;
    min-height: 120px; background: var(--bg2); border: 1px dashed var(--border);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    color: var(--text3); font-size: 12px;
  }

  #result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    animation: fadeIn 0.3s ease;
  }
  #result-overlay.show { display: flex; }
  #result-overlay.lose { background: rgba(0,0,0,0.85); }
  #result-overlay.clear { background: rgba(0,0,0,0.8); }
  #result-overlay .result-text {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 8px;
    text-shadow: 0 0 40px currentColor;
    animation: pulseTxt 0.6s ease infinite alternate;
  }
  #result-overlay.lose .result-text { color: #e74c3c; }
  #result-overlay.clear .result-text { color: var(--gold); }
  #result-overlay .result-sub { font-size: 14px; color: rgba(255,255,255,0.6); }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes pulseTxt { from { opacity:0.7; transform:scale(0.97); } to { opacity:1; transform:scale(1.03); } }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen" class="show">
  <div id="login-logo-wrap">
    <img id="login-logo" src="" alt="SCROLLIA">
    <div id="login-tagline">SCROLL × MAGIC × ADVENTURE</div>
  </div>
  <div id="login-btn-wrap">
    <button class="login-btn-google" onclick="fbLogin()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
      Googleでログイン
    </button>
  </div>
  <div id="login-info">
    <div class="info-card" id="login-update-card">
      <div class="info-card-title">📢 アップデート情報</div>
      <div class="info-card-body" id="login-update-body">読み込み中...</div>
    </div>
    <div class="info-card" id="login-maintenance-card">
      <div class="info-card-title">🔧 メンテナンス予定</div>
      <div class="info-card-body" id="login-maintenance-body">読み込み中...</div>
    </div>
  </div>
  <div id="login-ad-zone">広告ゾーン</div>
</div>

<div id="debug-panel">
  <div id="debug-panel-header">
    🐛 DEBUG LOG
    <button onclick="document.getElementById('debug-panel-body').innerHTML=''" style="background:none;border:1px solid #e74c3c44;color:#e74c3c;padding:1px 5px;cursor:pointer;font-size:10px">CLR</button>
  </div>
  <div id="debug-panel-body"></div>
</div>

<div id="result-overlay">
  <div id="result-badge" style="font-size:56px;line-height:1"></div>
  <div class="result-text" id="result-text"></div>
  <div class="result-sub" id="result-sub"></div>
  <div id="result-list" style="margin-top:12px;text-align:left;max-width:280px;font-size:13px;line-height:2"></div>
  <div style="color:rgba(255,255,255,0.3);font-size:11px;margin-top:12px">タップで閉じる</div>
</div>

<div id="app">
  <div id="header">
    <img id="logo" src="" alt="SCROLLIA">
  </div>
  <div id="statusbar"></div>
  <div id="nav">
    <button class="nav-btn active" onclick="switchTab('town')">街</button>
    <button class="nav-btn" onclick="switchTab('store')">💎ストア</button>
    <button class="nav-btn" onclick="switchTab('world')">チャット</button>
  </div>
  <div id="content">
    <div id="town-screen" class="screen active"></div>
    <div id="explore-screen" class="screen"></div>
    <div id="combat-screen" class="screen"></div>
    <div id="shop-screen" class="screen"></div>
    <div id="bazaar-screen" class="screen"></div>
    <div id="chat-screen" class="screen"></div>
    <div id="store-screen" class="screen"></div>
    <div id="world-screen" class="screen"></div>
    <div id="status-screen" class="screen"></div>
    <div id="scrolls-screen" class="screen"></div>
    <div id="summon-screen" class="screen"></div>
    <div id="profile-screen" class="screen"></div>
    <div id="dm-screen" class="screen"></div>
  </div>
</div>

<div class="modal-overlay" id="equip-modal">
  <div class="modal">
    <div class="modal-title" id="equip-modal-title">装備選択</div>

function petStats(mKey, lv) {
  const m = MONSTERS[mKey];
  if (!m) return { hp: 0, atk: 0 };
  const lvMult = 1 + (lv - 1) * 0.1;
  const rarMult = m.superRare ? 2.5 : m.rare ? 1.5 : 1.0;
  return {
    hp:  Math.floor(m.baseHp  * lvMult * rarMult),
    atk: Math.floor(m.baseAtk * lvMult * rarMult),
  };
}

function petLvUpCost(lv) {
  return Math.floor(lv * 1.5);
}

function petAct(pet, enemy) {
  const m = MONSTERS[pet.mKey];
  const stats = petStats(pet.mKey, pet.lv);
  const ef = effective();
  let msg = '';
  if (pet.currentHp <= 0) return '';
  switch (m.petType) {
    case 'attack': {
      const dmg = Math.max(1, Math.floor(stats.atk * (0.8 + Math.random() * 0.4)));
      enemy.hp -= dmg;
      msg = `🐾 ${m.name}の攻撃！ ${dmg}ダメージ`;
      break;
    }
    case 'magic': {
      const dmg = Math.max(1, Math.floor(stats.atk * (1.0 + Math.random() * 0.5)));
      enemy.hp -= dmg;
      msg = `✨ ${m.name}の魔法攻撃！ ${dmg}ダメージ`;
      break;
    }
    case 'heal': {
      const roll = Math.random();
      if (roll < 0.33) {
        const heal = Math.max(1, Math.floor(stats.atk * 0.8));
        S.currentHp = Math.min(ef.hp, S.currentHp + heal);
        msg = `💚 ${m.name}の回復！ HP+${heal}`;
      } else if (roll < 0.66) {
        pet.shield = true;
        msg = `🛡️ ${m.name}の防御！ 次の攻撃を軽減`;
      } else {
        const dmg = Math.max(1, Math.floor(stats.atk * 0.5));
        enemy.hp -= dmg;
        msg = `⚔️ ${m.name}の攻撃！ ${dmg}ダメージ`;
      }
      break;
    }
    case 'tank': {
      if (Math.random() < 0.5) {
        pet.taunt = true;
        msg = `🛡️ ${m.name}が身代わりを構えた！`;
      } else {
        const dmg = Math.max(1, Math.floor(stats.atk * 0.6));
        enemy.hp -= dmg;
        msg = `👊 ${m.name}の攻撃！ ${dmg}ダメージ`;
      }
      break;
    }
  }
  return msg;
}

function getSeriesBonus() {
  const count = {};
  for (const slot of ['head','body','ring']) {
    const item = S.equipped && S.equipped[slot];
    if (!item || !item.seriesKey) continue;
    count[item.seriesKey] = (count[item.seriesKey] || 0) + 1;
  }
  const bonuses = {};
  for (const [series, cnt] of Object.entries(count)) {
    if (cnt >= 2) {
      const ef = SERIES_EFFECTS[series];
      if (ef) bonuses[ef.effect] = (bonuses[ef.effect] || 0) + ef.value * (cnt >= 3 ? 2 : 1);
    }
  }
  return bonuses;
}

// ==================== DEBUG ====================
const _debugLog = [];
function dbg(msg, type) {
  const time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const cls = type || (msg.startsWith('ERROR') ? 'error' : msg.startsWith('WARN') ? 'warn' : msg.startsWith('switchTab') ? 'info' : '');
  _debugLog.push({ time, msg, cls });
  if (_debugLog.length > 60) _debugLog.shift();
  const el = document.getElementById('debug-panel-body');
  if (el) {
    const div = document.createElement('div');
    if (cls) div.className = cls;
    div.textContent = `[${time}] ${msg}`;
    el.insertBefore(div, el.firstChild);
    if (el.children.length > 60) el.removeChild(el.lastChild);
  }
}
const _origError = console.error.bind(console);
console.error = (...args) => { dbg('ERROR: ' + args.join(' ')); _origError(...args); };
const _origWarn = console.warn.bind(console);
console.warn = (...args) => { dbg('WARN: ' + args.join(' ')); _origWarn(...args); };
window.onerror = (msg, src, line) => { dbg('GLOBAL: ' + msg + ' L' + line); };

async function fbLogin() {
  try {
    const { auth, provider, signInWithPopup } = window._fb;
    await signInWithPopup(auth, provider);
  } catch(e) { dbg('LOGIN ERROR: ' + e.message); }
}

async function fbLogout() {
  try {
    const { auth, signOut } = window._fb;
    await signOut(auth);
    window._fbUser = null;
    renderStatusBar();
  } catch(e) { dbg('LOGOUT ERROR: ' + e.message); }
}

async function fbSave() {
  if (!window._fbUser || !window._fb) return;
  try {
    const { db, doc, setDoc } = window._fb;
    await setDoc(doc(db, 'saves', window._fbUser.uid), { ...S, updatedAt: Date.now() });
  } catch(e) { dbg('SAVE ERROR: ' + e.message); }
}

async function fbLoad() {
  if (!window._fbUser || !window._fb) return false;
  try {
    const { db, doc, getDoc } = window._fb;
    const snap = await getDoc(doc(db, 'saves', window._fbUser.uid));
    if (snap.exists()) {
      const data = snap.data();
      delete data.updatedAt;
      S = Object.assign(DEFAULT_STATE(), data);
      if (!S.scrollItems) S.scrollItems = [];
      if (!S.equipped) S.equipped = { head:null, body:null, ring:null, grimoire:null };
      if (!S.bossBadges) S.bossBadges = {};
      if (!S.stageBadges) S.stageBadges = {};
      if (!S.encounteredMonsters) S.encounteredMonsters = {};
      if (!S.inventory) S.inventory = [];
      if (!S.grimoires) S.grimoires = [];
      if (!S.pets) S.pets = [];
      if (!S.activePets) S.activePets = [];
      if (!S.contractBloods) S.contractBloods = {};
      dbg('Firestore load OK');
      return true;
    }
  } catch(e) { dbg('LOAD ERROR: ' + e.message); }
  return false;
}

window.onFirebaseAuthChanged = async (user) => {
  if (user) {
    window._fbLoginTime = new Date();
    dbg('LOGIN: ' + user.displayName);
    const loaded = await fbLoad();
    if (!loaded) await fbSave();
    await fbSaveProfile();
    const ls = document.getElementById('login-screen');
    if (ls) ls.classList.remove('show');
    render();
    renderStatusBar();
    fbSubscribeWorldChat();
    fbSubscribeBazaar();
  } else {
    dbg('LOGOUT');
    const ls = document.getElementById('login-screen');
    if (ls) ls.classList.add('show');
    renderStatusBar();
    fbLoadLoginInfo();
  }
};

async function fbSaveProfile() {
  if (!window._fbUser || !window._fb) return;
  try {
    const { db, doc, setDoc } = window._fb;
    let maxArea = '未到達', maxStage = 0;
    const areaOrder = ['forest','cave','ruins','dragon_lair'];
    for (const akey of [...areaOrder].reverse()) {
      if (S.bossBadges && S.bossBadges[akey]) { maxArea = AREAS[akey].name + ' BOSS'; maxStage = 99; break; }
      for (let s = 5; s >= 1; s--) {
        if (S.stageBadges && S.stageBadges[`${akey}_s${s}`]) {
          maxArea = AREAS[akey].name; maxStage = s; break;
        }
      }
      if (maxStage > 0) break;
    }
    await setDoc(doc(db, 'users', window._fbUser.uid), {
      displayName: window._fbUser.displayName,
      photoURL: window._fbUser.photoURL || '',
      maxArea, maxStage,
      equipped: S.equipped || {},
      updatedAt: Date.now(),
    }, { merge: true });
  } catch(e) { dbg('PROFILE SAVE ERROR: ' + e.message); }
}

function renderUserProfile(uid, p) {
  const isMe = window._fbUser && window._fbUser.uid === uid;
  const equipped = p.equipped || {};
  const slotLabel = { head:'帽子', body:'ローブ', ring:'指輪', grimoire:'魔導書' };
  let equipHtml = ['head','body','ring','grimoire'].map(slot => {
    const item = equipped[slot];
    if (!item) return `<div style="color:var(--text3);font-size:12px">${slotLabel[slot]}: 未装備</div>`;
    const base = (item.baseKey && (EQUIPMENT_BASE[item.baseKey] || SERIES_EQUIP[item.baseKey])) || null;
    if (item.type === 'grimoire') {
      const sc = SCROLLS[item.scrollKey];
      const color = RARITY[item.rarity]?.color || 'var(--text)';
      return `<div style="color:${color};font-size:12px">📖 空白の魔導書（${RARITY[item.rarity]?.name}）${sc ? sc.icon + sc.name + ' Lv' + item.scrollLv : ''}</div>`;
    }
    if (!base) return `<div style="color:var(--text3);font-size:12px">${slotLabel[slot]}: 不明</div>`;
    const color = RARITY[base.rarity]?.color || 'var(--text)';
    let stats = [];
    if (item.hp) stats.push(`HP+${item.hp}`);
    if (item.luk) stats.push(`LUK+${item.luk}`);
    if (item.mult) stats.push(`魔法×${item.mult}`);
    return `<div style="color:${color};font-size:12px">${base.icon} ${base.name} <span style="color:var(--text3)">${stats.join('/')}</span></div>`;
  }).join('');

  const dmBtn = isMe ? '' : `<button class="btn btn-purple" style="width:100%;margin-top:8px" onclick="openDM('${uid}','${escHtml(p.displayName)}')">💬 DMを送る</button>`;

  document.getElementById('profile-screen').innerHTML = `
    <div class="panel" style="display:flex;align-items:center;gap:12px">
      ${p.photoURL ? `<img src="${p.photoURL}" style="width:48px;height:48px;border-radius:50%;border:2px solid var(--gold)">` : '<div style="width:48px;height:48px;border-radius:50%;background:var(--bg3);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center">👤</div>'}
      <div>
        <div style="font-weight:bold;font-size:16px">${escHtml(p.displayName)}</div>
        <div style="color:var(--text2);font-size:12px">最高到達: ${p.maxArea || '未到達'} ${p.maxStage && p.maxStage < 99 ? 'S' + p.maxStage : ''}</div>
      </div>
    </div>
    <div class="section-title">⚔️ 装備中</div>
    <div class="panel">${equipHtml}</div>
    ${dmBtn}
    <button class="btn" style="width:100%;margin-top:8px;border-color:var(--border);color:var(--text2)" onclick="switchTab('world')">← 戻る</button>
  `;
}

let currentDMUid = null;

function getDMRoomId(uid1, uid2) { return [uid1, uid2].sort().join('_'); }

async function openDM(uid, name) {
  currentDMUid = uid;
  currentDMName = name;
  switchTab('dm');
  renderDM();
  fbSubscribeDM();
}

function renderDM() {
  document.getElementById('dm-screen').innerHTML = `
    <div class="panel" style="display:flex;align-items:center;gap:8px">
      <button class="btn" style="border-color:var(--border);color:var(--text2);padding:4px 10px;font-size:12px" onclick="switchTab('world')">← 戻る</button>
      <div style="font-weight:bold">${escHtml(currentDMName || '')}</div>
    </div>
    <div class="chat-window" id="dm-window" style="height:320px"></div>
    <div style="display:flex;gap:6px;margin-top:6px">
      <input type="text" id="dm-input" placeholder="メッセージ..." maxlength="200"
        style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:8px 10px;color:var(--text);font-family:inherit;font-size:13px"
        onkeydown="if(event.key==='Enter')dmSend()">
      <button class="btn btn-gold" onclick="dmSend()">送信</button>
    </div>
  `;
}

function fbSubscribeDM() {
  if (!window._fbUser || !window._fb || !currentDMUid) return;
  if (_dmUnsub) _dmUnsub();
  const roomId = getDMRoomId(window._fbUser.uid, currentDMUid);
  const { db, collection, query, orderBy, limit, onSnapshot } = window._fb;
  const q = query(collection(db, 'dm', roomId, 'messages'), orderBy('ts', 'asc'), limit(50));
  _dmUnsub = onSnapshot(q, (snap) => {
    const win = document.getElementById('dm-window');
    if (!win) return;
    win.innerHTML = snap.docs.map(d => {
      const m = d.data();
      const isMe = m.uid === window._fbUser.uid;
      const time = m.ts ? new Date(m.ts.toDate()).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) : '';
      return '<div class="chat-msg">'
        + '<div class="cm-name ' + (isMe ? 'player' : 'npc') + '">' + escHtml(m.name)
        + ' <span style="color:var(--text3);font-size:10px">' + time + '</span></div>'
        + '<div class="cm-text" style="' + (isMe ? 'background:rgba(201,168,76,0.1);' : '') + '">' + escHtml(m.text) + '</div></div>';
    }).join('');
    win.scrollTop = win.scrollHeight;
  });
  if (window._fb) {
    const { db, doc, setDoc } = window._fb;
    setDoc(doc(db, 'users', window._fbUser.uid, 'dmList', currentDMUid), {
      uid: currentDMUid, name: currentDMName, updatedAt: Date.now(),
    }, { merge: true });
  }
}

async function dmSend() {
  const input = document.getElementById('dm-input');
  if (!input || !input.value.trim()) return;
  if (!window._fbUser || !window._fb) return;
  const text = input.value.trim();
  input.value = '';
  const roomId = getDMRoomId(window._fbUser.uid, currentDMUid);
  try {
    const { db, collection, addDoc, serverTimestamp } = window._fb;
    await addDoc(collection(db, 'dm', roomId, 'messages'), {
      uid: window._fbUser.uid, name: window._fbUser.displayName, text, ts: serverTimestamp(),
    });
  } catch(e) { dbg('DM ERROR: ' + e.message); }
}

async function renderWorld() {
  if (!window._fbUser || !window._fb) {
    document.getElementById('world-screen').innerHTML = `
      <div class="panel"><div class="panel-title">💬 個人チャット</div></div>
      <div class="msg msg-info">ログインするとDMが使えます</div>
    `;
    return;
  }
  try {
    const { db, collection, getDocs, query, orderBy } = window._fb;
    const q = query(collection(db, 'users', window._fbUser.uid, 'dmList'), orderBy('updatedAt', 'desc'));
    const snap = await getDocs(q);
    const dmList = snap.docs.map(d => d.data());
    let html = '<div class="panel"><div class="panel-title">💬 個人チャット</div></div>';
    if (dmList.length === 0) {
      html += '<div class="msg msg-info">DMはまだありません。ワールドチャットの発言者をタップして始めましょう</div>';
    } else {
      dmList.forEach(dm => {
        html += `<div class="shop-item" onclick="openDM('${dm.uid}','${escHtml(dm.name)}')" style="cursor:pointer">
          <div class="si-info"><div style="font-weight:bold">${escHtml(dm.name)}</div></div>
          <div style="color:var(--text3);font-size:18px">›</div></div>`;
      });
    }
    document.getElementById('world-screen').innerHTML = html;
  } catch(e) {
    dbg('DM LIST ERROR: ' + e.message);
    document.getElementById('world-screen').innerHTML = '<div class="msg msg-info">読み込みエラー</div>';
  }
}

async function fbLoadLoginInfo() {
  const loginLogo = document.getElementById('login-logo');
  const appLogo = document.getElementById('logo');
  if (loginLogo && appLogo) loginLogo.src = appLogo.src;
  if (!window._fb) return;
  try {
    const { db, doc, getDoc } = window._fb;
    const snap = await getDoc(doc(db, 'info', 'announcements'));
    const ub = document.getElementById('login-update-body');
    const mb = document.getElementById('login-maintenance-body');
    if (snap.exists()) {
      const d = snap.data();
      if (ub) ub.textContent = d.update || 'なし';
      if (mb) mb.textContent = d.maintenance || '予定なし';
    } else {
      if (ub) ub.textContent = 'なし';

let _wcUnsub = null;

function fbSubscribeWorldChat() {
  if (!window._fb || !window._fbUser) return;
  if (_wcUnsub) _wcUnsub();
  const { db, collection, query, orderBy, limit, onSnapshot, where } = window._fb;
  // ログイン時刻以降のメッセージのみ表示
  const loginTs = window._fbLoginTime || new Date();
  const q = query(collection(db, 'worldchat'), orderBy('ts', 'asc'), where('ts', '>=', loginTs), limit(50));
  _wcUnsub = onSnapshot(q, (snap) => {
    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const win = document.getElementById('wc-window');
    if (!win) return;
    win.innerHTML = msgs.map(m => {
      const isMe = m.uid === window._fbUser?.uid;
      const time = m.ts ? new Date(m.ts.toDate()).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) : '';
      const nameClickable = (!isMe) ? ' style="cursor:pointer;text-decoration:underline dotted" onclick="openUserProfile(\'' + m.uid + '\')"' : '';
      return '<div class="chat-msg">'
        + '<div class="cm-name ' + (isMe ? 'player' : 'npc') + '"' + nameClickable + '>'
        + escHtml(m.name) + ' <span style="color:var(--text3);font-size:10px">' + time + '</span></div>'
        + '<div class="cm-text" style="' + (isMe ? 'background:rgba(201,168,76,0.1);' : '') + '">' + escHtml(m.text) + '</div></div>';
    }).join('');
    win.scrollTop = win.scrollHeight;
  });
}

async function wcSend() {
  const input = document.getElementById('wc-input');
  if (!input || !input.value.trim()) return;
  if (!window._fbUser || !window._fb) { alert('ログインが必要です'); return; }
  const text = input.value.trim();
  input.value = '';
  try {
    const { db, collection, addDoc, serverTimestamp } = window._fb;
    await addDoc(collection(db, 'worldchat'), {
      uid: window._fbUser.uid,
      name: window._fbUser.displayName,
      text,
      ts: serverTimestamp(),
    });
  } catch(e) { dbg('WC SEND ERROR: ' + e.message); }
}

async function fbBazaarBuy(docId) {
  if (!window._fbUser || !window._fb) { alert('ログインが必要です'); return; }
  const item = _bazItems.find(i => i._docId === docId) || BAZAAR_NPC_SEED.find(i => i.id === docId);

  if (S.gold < item.price) { alert('Goldが足りません'); return; }

  if (item.grimoireRarity) {

async function fbBazaarCancel(docId) {
  if (!window._fbUser || !window._fb) return;
  const item = _bazItems.find(i => i._docId === docId);
  if (!item || item.uid !== window._fbUser.uid) return;
  if (!confirm('出品を取り消しますか？')) return;
  if (item.grimoireRarity) {
    if (!S.grimoires) S.grimoires = [];
    S.grimoires.push({ rarity: item.grimoireRarity });
  } else if (item.scrollType) {
    for (let i = 0; i < (item.qty || 1); i++) addScroll(item.scrollType, item.scrollLv || 1);
  }
  try {
    const { db, doc, deleteDoc } = window._fb;
    await deleteDoc(doc(db, 'bazaar', docId));
  } catch(e) { dbg('BAZAAR CANCEL ERROR: ' + e.message); }
  saveGame();
}

// ==================== PERSISTENCE ====================

function loadGame() {
  const d = localStorage.getItem('scroll_chronicle_save');
  if (d) {
    try {
      const parsed = JSON.parse(d);
      S = Object.assign(DEFAULT_STATE(), parsed);
      if (S.scrolls && !parsed.scrollItems) {
        S.scrollItems = [];
        for (const [k, v] of Object.entries(S.scrolls)) {
          if (SCROLLS[k]) for (let i = 0; i < v; i++) S.scrollItems.push({ key: k, lv: 1 });
        }
      }
      if (!S.scrollItems) S.scrollItems = [];
      if (!S.equipped) S.equipped = { head:null, body:null, ring:null, grimoire:null };
      if (S.equipped.grimoire === undefined) S.equipped.grimoire = null;
      if (!S.bossBadges) S.bossBadges = {};
      if (!S.stageBadges) S.stageBadges = {};
      if (!S.encounteredMonsters) S.encounteredMonsters = {};
      if (!S.inventory) S.inventory = [];
      if (!S.grimoires) S.grimoires = [];
      if (!S.pets) S.pets = [];
      if (!S.activePets) S.activePets = [];
      if (!S.contractBloods) S.contractBloods = {};
      if (!S.summonStones) S.summonStones = 0;
      delete S.scrolls; delete S.equip; delete S.bazaarListings;
    } catch(e) { console.error('loadGame error:', e); S = DEFAULT_STATE(); }
  }
}

function resetGame() {
  if (!confirm('セーブデータを消去してゲームをリセットしますか？')) return;
  localStorage.removeItem('scroll_chronicle_save');

function effective() {
  let hp = S.baseHp + (S.lv - 1) * 8;
  let luk = S.baseLuk + Math.floor((S.lv - 1) / 2);
  let mult = 1.0;
  for (const slot of ['head','body','ring']) {
    const item = S.equipped && S.equipped[slot];
    if (!item) continue;
    hp   += item.hp  || 0;
    luk  += item.luk || 0;
    if (item.mult && item.mult > 0) mult *= item.mult;
  }
  return { hp, luk, mult };
}

function critRate() { return Math.min(0.5, effective().luk * 0.015); }
function expNeeded() { return 40 + S.lv * 30; }

function calcScrollDmg(scrollKey, scrollLv, isBoss) {
  const sc = SCROLLS[scrollKey];
  if (!sc) return 0;
  const rarMult = RARITY[sc.rarity].mult;
  const lvMult = 1 + (S.lv - 1) * 0.05;
  const slvMult = 1 + ((scrollLv || 1) - 1) * 0.15;
  const magicMult = effective().mult || 1.0;
  const bonus = getSeriesBonus();
  let seriesMult = 1.0;
  if (bonus.all_boost) seriesMult += bonus.all_boost;
  if (sc.attr === 'thunder' && bonus.thunder_boost) seriesMult += bonus.thunder_boost;
  if (sc.attr === 'ice'     && bonus.ice_boost)     seriesMult += bonus.ice_boost;
  if (isBoss && bonus.boss_boost) seriesMult += bonus.boss_boost;
  return Math.floor(sc.base * rarMult * lvMult * slvMult * magicMult * seriesMult);
}

function countScrolls(key) { return S.scrollItems.filter(i => i.key === key).length; }
function addScroll(key, lv) { S.scrollItems.push({ key, lv: lv || 1 }); }
function removeScrollByKey(key, qty) {
  let removed = 0;
  S.scrollItems = S.scrollItems.filter(i => {
    if (i.key === key && removed < qty) { removed++; return false; }
    return true;
  });
}

function renderStageList(areaKey) {
  currentTab = 'explore';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('explore-screen').classList.add('active');

  const badge = S.bossBadges[areaKey];

  function monsterTag(mKey, isSecret) {
    const m = MONSTERS[mKey];
    const known = S.encounteredMonsters[mKey];

    return `${m.icon} ${m.name}`;
  }

  for (let i = 1; i <= 5; i++) {

    const rareTag = monsterTag(area.rare, true);
    const superRareTag = monsterTag(area.superRare, true);

        </div>

    `;
  }

    <div class="area-card" onclick="startExplore('${areaKey}', 5)" style="border-color:rgba(231,76,60,0.4)">

function _pickMonster(area) {
  const r = Math.random();
  if (r < 0.005) return area.superRare;
  if (r < 0.055) return area.rare;
  return area.normal[Math.floor(Math.random() * area.normal.length)];
}

function _startBattle(areaKey, stage, mKey, isBoss, battleNum) {
  S.encounteredMonsters[mKey] = true;
  const m = MONSTERS[mKey];
  const lvBonus = Math.max(0, S.lv - 3);
  const enemyHp = m.hp + lvBonus * 3;
  const enemyAtk = m.atk + Math.floor(lvBonus * 0.5);
  const label = isBoss
    ? `💥 BOSS ${m.icon}${m.name}が立ちはだかる！`
    : `⚔️ [${battleNum}/5] ${m.icon}${m.name}が現れた！${m.rare ? '（レア！）' : m.superRare ? '（超レア！！）' : ''}`;
  COMBAT = {
    mKey, areaKey, stage, isBoss, battleNum: battleNum || 1,
    enemyHp, enemyMaxHp: enemyHp, enemyAtk,
    log: [label],
    totalExp: 0, totalGold: 0, droppedScrolls: [], droppedEquips: [], lvUps: [],
  };
  currentTab = 'combat';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('combat-screen').classList.add('active');
  render();
}

function startExplore(areaKey, stage) {
  const area = AREAS[areaKey];
  if (stage >= 5) _startBattle(areaKey, stage, area.boss, true, null);
  else _startBattle(areaKey, stage, _pickMonster(area), false, 1);
}

function renderCombat() {
  if (!COMBAT) { renderExplore(); return; }
  const m = MONSTERS[COMBAT.mKey];
  const ef = effective();
  const hpPct = Math.max(0, Math.round(S.currentHp / ef.hp * 100));
  const ehpPct = Math.max(0, Math.round(COMBAT.enemyHp / COMBAT.enemyMaxHp * 100));

  if (!S.activePets) S.activePets = [];
  if (!S.pets) S.pets = [];

  if (!COMBAT.scrollSortDesc) COMBAT.scrollSortDesc = true;
  const rarityOrder = { architect:4, legend:3, epic:2, rare:1, common:0 };

  const grouped = {};
  S.scrollItems.forEach((item, idx) => {
    const sc = SCROLLS[item.key];
    if (!sc) return;
    const rk = sc.rarity;
    if (!grouped[rk]) grouped[rk] = {};
    const ak = sc.attr;
    if (!grouped[rk][ak]) grouped[rk][ak] = [];
    grouped[rk][ak].push({ item, idx });
  });

  const rarityKeys = Object.keys(grouped).sort((a,b) =>
    COMBAT.scrollSortDesc ? rarityOrder[b] - rarityOrder[a] : rarityOrder[a] - rarityOrder[b]
  );
  const rarityLabel = { common:'コモン', rare:'レア', epic:'エピック', legend:'レジェンド', architect:'アーキテクト' };
  const attrOrder = ['fire','ice','water','thunder'];

  let scrollHtml = '';
  rarityKeys.forEach(rk => {
    const color = RARITY[rk].color;
    scrollHtml += `<div style="grid-column:1/-1;font-size:11px;font-weight:bold;color:${color};margin-top:6px;padding-bottom:2px;border-bottom:1px solid ${color}33">${rarityLabel[rk]}</div>`;
    attrOrder.forEach(ak => {
      if (!grouped[rk][ak]) return;
      grouped[rk][ak].forEach(({ item, idx }) => {
        const sc = SCROLLS[item.key];
        scrollHtml += `<button class="scroll-btn" onclick="useScroll(${idx})" style="border-color:${color}55">
          <span class="s-icon">${sc.icon}</span>
          <span class="s-name" style="color:${color};font-size:10px">${sc.name}</span>
          <span class="s-count" style="color:${color}">Lv${item.lv}</span>
        </button>`;
      });
    });
  });
  if (!scrollHtml) scrollHtml = '<div style="color:var(--text3);font-size:12px;grid-column:1/-1;text-align:center">スクロールなし</div>';

  let logHtml = COMBAT.log.slice(-12).map(entry => {
    const l = typeof entry === 'string' ? entry : entry.msg;
    const type = typeof entry === 'string' ? 'sys' : (entry.type || 'sys');
    return `<div class="log-line log-${type}">${l}</div>`;
  }).join('');

  document.getElementById('combat-screen').innerHTML = `
    <div class="combat-top">
      <div class="combatant">
        <div class="c-name player">あなた</div>
        <div style="text-align:center;margin:4px 0"><img src="${PLAYER_IMAGE}" style="height:100px;object-fit:contain;image-rendering:pixelated"></div>
        <div class="hp-bar-wrap"><div class="hp-bar player" style="width:${hpPct}%"></div></div>
        <div class="c-hp">${S.currentHp} / ${ef.hp}</div>
        ${S.activePets && S.activePets.length > 0 ? '<div style="display:flex;gap:4px;margin-top:6px;justify-content:center;flex-wrap:wrap">' + S.activePets.map(pi => {
          const pet = S.pets[pi]; if (!pet) return '';
          const pm = MONSTERS[pet.mKey];
          const ps = petStats(pet.mKey, pet.lv);
          const petImg = MONSTER_IMAGES[pet.mKey];
          const petHp = pet.currentHp !== undefined ? pet.currentHp : ps.hp;
          const petHpPct = Math.max(0, Math.round(petHp / ps.hp * 100));
          const tIcon = {attack:'⚔️',magic:'✨',heal:'💚',tank:'🛡️'}[pm.petType] || '';
          return '<div style="width:72px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:4px;text-align:center">'
            + (petImg ? '<img src="' + petImg + '" style="height:40px;object-fit:contain;image-rendering:pixelated">' : pm.icon)
            + '<div style="font-size:9px;color:var(--text2);margin-top:2px">' + tIcon + ' Lv' + pet.lv + '</div>'
            + '<div style="background:#1a0a0a;border-radius:2px;height:3px;margin-top:2px"><div style="width:' + petHpPct + '%;height:100%;background:#2ecc71;border-radius:2px"></div></div>'
            + '<div style="font-size:8px;color:var(--text3)">' + petHp + '/' + ps.hp + '</div></div>';
        }).join('') + '</div>' : ''}
      </div>
      <div class="combatant">
        <div class="c-name enemy">${m.icon} ${m.name}</div>
        ${MONSTER_IMAGES[COMBAT.mKey] ? '<div style="text-align:center;margin:4px 0"><img src="' + MONSTER_IMAGES[COMBAT.mKey] + '" style="height:100px;object-fit:contain;image-rendering:pixelated"></div>' : ''}
        <div class="hp-bar-wrap"><div class="hp-bar enemy" style="width:${ehpPct}%"></div></div>
        <div class="c-hp">${COMBAT.enemyHp} / ${COMBAT.enemyMaxHp}</div>
        ${m.weak && m.weak.length > 0 ? '<div style="font-size:10px;color:#f39c12;margin-top:2px">弱点: ' + m.weak.map(w => ({fire:'🔥火',ice:'❄️氷',water:'💧水',thunder:'⚡雷'}[w]||w)).join(' ') + '</div>' : ''}
      </div>
    </div>
    <div class="combat-log">${logHtml}</div>
    <div style="display:flex;gap:6px;margin-bottom:6px">
      ${(() => {
        const eg = S.equipped.grimoire;
        if (eg && eg.scrollKey) {
          const sc = SCROLLS[eg.scrollKey];
          const color = GRIMOIRE[eg.rarity].color;
          const attr = {fire:'🔥火',ice:'❄️氷',water:'💧水',thunder:'⚡雷'}[sc.attr] || sc.attr;
          return `<button class="btn btn-blue" style="flex:1;font-size:12px" onclick="useMagicBullet()">✨ 魔弾 <span style="color:${color}">${attr} Lv${eg.scrollLv}</span></button>`;
        }
        return `<button class="btn btn-blue" style="flex:1;font-size:12px" onclick="useMagicBullet()">✨ 魔弾 <span style="color:var(--text2)">無属性 Lv${S.lv}</span></button>`;
      })()}
      <button class="btn" style="border-color:var(--border);color:var(--text2);font-size:11px;padding:4px 8px" onclick="toggleScrollSort()">
        ${COMBAT.scrollSortDesc ? '↓高→低' : '↑低→高'}
      </button>
    </div>
    <div class="scroll-grid">${scrollHtml}</div>
    <div class="combat-actions">
      <button class="btn btn-red" onclick="fleeCombat(false)">逃走(-10%G)</button>
    </div>
  `;
  const logEl = document.querySelector('.combat-log');
  if (logEl) logEl.scrollTop = logEl.scrollHeight;
}

function toggleScrollSort() {
  if (COMBAT) COMBAT.scrollSortDesc = !COMBAT.scrollSortDesc;
  render();
}

function addLog(msg, type) { COMBAT.log.push({ msg, type: type || 'sys' }); }

function useMagicBullet() {
  if (!COMBAT) return;
  const m = MONSTERS[COMBAT.mKey];
  const eg = S.equipped.grimoire;
  let dmg, extra = '';
  if (eg && eg.scrollKey) {
    const baseDmg = calcScrollDmg(eg.scrollKey, eg.scrollLv || 1);
    const mult = GRIMOIRE[eg.rarity].bulletMult;
    dmg = Math.max(1, Math.floor(baseDmg * mult));
    const sc = SCROLLS[eg.scrollKey];
    if (m.weak && m.weak.includes(sc.attr)) { dmg = Math.floor(dmg * 1.5); extra += '⚡弱点×1.5 '; }
    const color = GRIMOIRE[eg.rarity].color;
    extra += `<span style="color:${color}">[${RARITY[eg.rarity].name}魔導書]</span>`;
  } else {
    const lvMult = 1 + (S.lv - 1) * 0.05;
    dmg = Math.max(1, Math.floor(8 * lvMult));
  }
  if (Math.random() < critRate()) { dmg = Math.floor(dmg * 1.7); extra += '💥クリティカル！'; }
  COMBAT.enemyHp -= dmg;
  addLog(`✨ 魔弾 → ${m.name}に ${dmg}ダメージ ${extra}`, 'player');
  if (COMBAT.enemyHp <= 0) { combatVictory(); return; }
  doPetActions();
  if (COMBAT.enemyHp <= 0) { combatVictory(); return; }
  doEnemyAttack();
  if (S.currentHp <= 0) { combatDefeat(); return; }
  render();
}

function doPetActions() {
  if (!S.activePets || !S.pets) return;
  const enemy = COMBAT;
  S.activePets.forEach(pi => {
    const pet = S.pets[pi];
    if (!pet || (pet.currentHp !== undefined && pet.currentHp <= 0)) return;
    const msg = petAct(pet, enemy);
    if (msg) addLog(msg, 'ally');
  });
}

function doEnemyAttack() {
  const m = MONSTERS[COMBAT.mKey];
  let tanked = false;
  if (S.activePets && S.pets) {
    S.activePets.forEach(pi => {
      const pet = S.pets[pi];
      if (!pet || tanked) return;
      if (pet.taunt && pet.currentHp > 0) {
        const ps = petStats(pet.mKey, pet.lv);
        const dmg = Math.floor(COMBAT.enemyAtk * 0.8);
        pet.currentHp = Math.max(0, (pet.currentHp || ps.hp) - dmg);
        addLog(`🛡️ ${MONSTERS[pet.mKey].name}が身代わり！ ${dmg}ダメージ`, 'ally');
        pet.taunt = false; tanked = true;
      }
    });
  }
  if (!tanked) {
    S.currentHp -= COMBAT.enemyAtk;
    addLog(`⚠️ ${m.name}の攻撃！ ${COMBAT.enemyAtk}ダメージを受けた`, 'enemy');
  }
}

function useScroll(idx) {
  if (!COMBAT) return;
  const item = S.scrollItems[idx];
  if (!item) return;
  const sc = SCROLLS[item.key];
  const m = MONSTERS[COMBAT.mKey];
  S.scrollItems.splice(idx, 1);
  let dmg = calcScrollDmg(item.key, item.lv);
  let extra = '';
  if (m.weak && m.weak.includes(sc.attr)) { dmg = Math.floor(dmg * 1.5); extra += '⚡弱点×1.5 '; }
  if (Math.random() < critRate()) { dmg = Math.floor(dmg * 1.7); extra += '💥クリティカル！'; }
  COMBAT.enemyHp -= dmg;
  const rarColor = RARITY[sc.rarity].color;
  addLog(`${sc.icon} <span style="color:${rarColor}">${sc.name} Lv${item.lv}</span> → ${m.name}に ${dmg}ダメージ ${extra}`, 'player');
  if (COMBAT.enemyHp <= 0) { combatVictory(); return; }
  doPetActions();
  if (COMBAT.enemyHp <= 0) { combatVictory(); return; }
  doEnemyAttack();
  if (S.currentHp <= 0) { combatDefeat(); return; }
  render();
}

function combatVictory() {
  const m = MONSTERS[COMBAT.mKey];
  const bonus = getSeriesBonus();
  const expGain = Math.floor((m.hp / 5 + COMBAT.enemyAtk) * (1 + (bonus.exp_boost || 0)));
  const goldGain = m.gold + Math.floor(Math.random() * Math.ceil(m.gold * 0.3));
  S.exp += expGain; S.gold += goldGain;
  S.encounteredMonsters[COMBAT.mKey] = true;
  COMBAT.totalExp = (COMBAT.totalExp || 0) + expGain;
  COMBAT.totalGold = (COMBAT.totalGold || 0) + goldGain;

  const hour = new Date().getHours();
  const magicHour = hour >= 19 && hour < 21;
  const dropMult = magicHour ? 2 : 1;

  let dropMsg = '';
  if (Math.random() < 0.15 * dropMult) {
    const mRarity = m.superRare ? 'rare' : m.rare ? 'rare' : m.boss ? 'epic' : 'common';
    const pool = SCROLL_DROP_BY_RARITY[mRarity];
    const dropKey = pool[Math.floor(Math.random() * pool.length)];
    const area = AREAS[COMBAT.areaKey];
    const [minLv, maxLv] = area ? area.dropLv : [1, 2];
    const dropLv = minLv + Math.floor(Math.random() * (maxLv - minLv + 1));
    S.scrollItems.push({ key: dropKey, lv: dropLv });
    COMBAT.droppedScrolls = COMBAT.droppedScrolls || [];
    COMBAT.droppedScrolls.push({ key: dropKey, lv: dropLv });
    const sc = SCROLLS[dropKey];
    const scColor = RARITY[sc.rarity].color;
    dropMsg = `📜 <span style="color:${scColor}">${sc.icon}${sc.name} Lv${dropLv}（${RARITY[sc.rarity].name}）</span>を入手！`;
  }

  const uniquePool = UNIQUE_DROPS[COMBAT.mKey];
  if (uniquePool) {
    const uniqueChance = m.superRare ? 0.70 : m.rare ? 0.50 : 0;
    if (Math.random() < uniqueChance * dropMult) {
      const picked = uniquePool[Math.floor(Math.random() * uniquePool.length)];
      const rolled = rollSeriesEquipStats(picked);
      if (rolled) {
        S.inventory.push(rolled);
        COMBAT.droppedEquips = COMBAT.droppedEquips || [];
        COMBAT.droppedEquips.push(rolled);
        const base = SERIES_EQUIP[picked];
        dropMsg += ` ✨ <span style="color:${RARITY['legend'].color}">${base.icon}${base.name}（シリーズ装備！）</span>`;
      }
    }
  }

  if (Math.random() < 0.05 * dropMult && m.equipDrops && m.equipDrops.length > 0) {
    const oldKey = m.equipDrops[Math.floor(Math.random() * m.equipDrops.length)];
    const newKey = EQUIP_LEGACY_MAP[oldKey] || oldKey;
    const rolled = rollEquipStats(newKey);
    if (rolled) {
      S.inventory.push(rolled);
      COMBAT.droppedEquips = COMBAT.droppedEquips || [];
      COMBAT.droppedEquips.push(rolled);
      const base = EQUIPMENT_BASE[newKey];
      const eqColor = RARITY[base.rarity].color;
      dropMsg += ` ⚔️ <span style="color:${eqColor}">${base.icon}${base.name}（${RARITY[base.rarity].name}）</span>を入手！`;
    }
  }

  if (S.bossBadges && S.bossBadges['dragon_lair'] && Math.random() < 0.01 * dropMult) {
    if (!S.contractBloods) S.contractBloods = {};
    S.contractBloods[COMBAT.mKey] = (S.contractBloods[COMBAT.mKey] || 0) + 1;
    COMBAT.droppedEquips = COMBAT.droppedEquips || [];
    COMBAT.droppedEquips.push({ isBlood: true, mKey: COMBAT.mKey });
    dropMsg += ` 🩸 契約の血：${m.name}を入手！`;
  }

  const r = Math.random();
  let cumulative = 0;
  for (const entry of GRIMOIRE_DROP) {
    cumulative += entry.chance * dropMult;
    if (r < cumulative) {
      if (!S.grimoires) S.grimoires = [];
      S.grimoires.push({ rarity: entry.rarity });
      COMBAT.droppedEquips = COMBAT.droppedEquips || [];
      COMBAT.droppedEquips.push({ isGrimoire: true, rarity: entry.rarity });
      const g = GRIMOIRE[entry.rarity];
      dropMsg += ` 📖 <span style="color:${RARITY[entry.rarity].color}">${g.name}（${RARITY[entry.rarity].name}）</span>を入手！`;
      break;
    }
  }

  let lvMsg = '';
  while (S.exp >= expNeeded()) {
    S.exp -= expNeeded(); S.lv++;
    S.currentHp = effective().hp;
    COMBAT.lvUps = COMBAT.lvUps || [];
    COMBAT.lvUps.push(S.lv);
    lvMsg += ` 🆙 Lv${S.lv}にアップ！`;
  }

  const areaKey = COMBAT.areaKey;
  let stageMsg = '';
  if (areaKey && COMBAT.isBoss && !S.bossBadges[areaKey]) {
    S.bossBadges[areaKey] = true;
    stageMsg = `👑 BOSSを討伐！クリアバッジ獲得！`;
  } else if (areaKey && COMBAT.isBoss) {
    stageMsg = `👑 BOSS再討伐！`;
  }

  addLog(`✨ ${m.name}を倒した！ EXP+${expGain} GOLD+${goldGain}`, 'sys');
  if (dropMsg) addLog(dropMsg, 'drop');
  if (lvMsg) addLog(lvMsg);
  if (stageMsg) addLog(stageMsg);

  const wasBoss = COMBAT.isBoss;
  const clearedArea = areaKey;
  const clearedStage = COMBAT.stage;
  const nextBattle = (COMBAT.battleNum || 1) + 1;
  const totalExp = COMBAT.totalExp || 0;
  const totalGold = COMBAT.totalGold || 0;
  const droppedScrolls = COMBAT.droppedScrolls || [];
  const droppedEquips = COMBAT.droppedEquips || [];
  const lvUps = COMBAT.lvUps || [];

  if (!wasBoss && nextBattle <= 5) {
    const area = AREAS[clearedArea];
    const nextMKey = _pickMonster(area);
    const prevLog = COMBAT.log;
    const acc = { totalExp: COMBAT.totalExp, totalGold: COMBAT.totalGold, droppedScrolls: COMBAT.droppedScrolls, droppedEquips: COMBAT.droppedEquips, lvUps: COMBAT.lvUps };
    COMBAT = null; saveGame();
    setTimeout(() => {
      _startBattle(clearedArea, clearedStage, nextMKey, false, nextBattle);
      COMBAT.log = [...prevLog, `--- 次の敵 ---`, COMBAT.log[0]];
      Object.assign(COMBAT, acc);
      render();
    }, 600);
    return;
  }

  if (!wasBoss) {
    const sNum = (clearedStage || 0) + 1;
    const bKey = `${clearedArea}_s${sNum}`;
    if (!S.stageBadges[bKey]) S.stageBadges[bKey] = true;
  }

  COMBAT = null; saveGame();

  const subText = wasBoss
    ? (AREAS[clearedArea] ? AREAS[clearedArea].name + ' BOSS討伐' : '')
    : `ステージ ${(clearedStage || 0) + 1} クリア`;

  const resultLines = [];
  resultLines.push(`⭐ EXP +${totalExp}　💰 GOLD +${totalGold}`);
  if (lvUps && lvUps.length > 0) resultLines.push(`🆙 Lv${lvUps.join(', Lv')} にアップ！`);
  if (droppedScrolls && droppedScrolls.length > 0) {
    droppedScrolls.forEach(item => {
      if (SCROLLS[item.key]) resultLines.push(`${SCROLLS[item.key].icon} ${SCROLLS[item.key].name} Lv${item.lv}`);
    });
  }
  if (droppedEquips && droppedEquips.length > 0) {
    droppedEquips.forEach(item => {
      if (item.isGrimoire) resultLines.push(`📖 空白の魔導書（${RARITY[item.rarity].name}）`);
      else if (item.isBlood) { const bm = MONSTERS[item.mKey]; if (bm) resultLines.push(`🩸 契約の血：${bm.name}`); }
      else if (item.baseKey) { const base = (EQUIPMENT_BASE[item.baseKey] || SERIES_EQUIP[item.baseKey]); if (base) resultLines.push(`${base.icon} ${base.name}（${RARITY[base.rarity].name}）`); }
    });
  }

  renderStageList(clearedArea);
  showResult('clear', subText, resultLines, () => {
    S.currentHp = effective().hp;
    renderStageList(clearedArea);
  });
}

function goTown() {
  S.currentHp = effective().hp;
  if (COMBAT && COMBAT.areaKey) { const areaKey = COMBAT.areaKey; COMBAT = null; renderStageList(areaKey); }
  else { COMBAT = null; switchTab('town'); }
}

function showResult(type, sub, lines, cb) {
  const el = document.getElementById('result-overlay');
  if (!el) { if (cb) cb(); return; }
  el.className = `show ${type}`;
  document.getElementById('result-text').textContent = type === 'lose' ? 'LOSE' : 'CLEAR';
  document.getElementById('result-sub').textContent = sub || '';
  document.getElementById('result-badge').textContent = type === 'clear' ? (sub && sub.includes('BOSS') ? '👑' : '✅') : '';
  const listEl = document.getElementById('result-list');
  if (listEl) listEl.innerHTML = (lines || []).map(l => `<div>${l}</div>`).join('');
  const dismiss = () => { el.classList.remove('show'); el.removeEventListener('click', dismiss); if (cb) cb(); };
  el.addEventListener('click', dismiss);
}

function combatDefeat() {
  const penalty = Math.floor(S.gold * 0.15);
  S.gold = Math.max(0, S.gold - penalty);
  addLog(`💀 敗北... GOLD-${penalty}`, 'enemy');
  const areaKey = COMBAT ? COMBAT.areaKey : null;
  COMBAT = null; render();
  showResult('lose', `GOLD -${penalty}`, [], () => {
    S.currentHp = effective().hp;
    if (areaKey) renderStageList(areaKey); else switchTab('town');
  });
}

function fleeCombat(silent) {
  if (!silent) { const penalty = Math.floor(S.gold * 0.1); S.gold = Math.max(0, S.gold - penalty); }
  const areaKey = COMBAT ? COMBAT.areaKey : null;
  COMBAT = null; saveGame();
  if (!silent) { if (areaKey) renderStageList(areaKey); else goTown(); }
}

// ==================== SHOP ====================

const SCROLL_SHOP_PRICE = { common:50, rare:150, epic:400, legend:1200, architect:4000 };

function renderShop() {
  let scrollHtml = '';
  for (const [key, sc] of Object.entries(SCROLLS).filter(([,sc]) => sc.rarity !== 'architect')) {
    const rarColor = RARITY[sc.rarity].color;
    const cnt = countScrolls(key);
    const price = SCROLL_SHOP_PRICE[sc.rarity];
    scrollHtml += `<div class="shop-item">
      <div class="si-info">
        <div class="si-name" style="color:${rarColor}">${sc.name} <span class="tag" style="background:${rarColor}22;color:${rarColor}">${RARITY[sc.rarity].name}</span> <span class="tag tag-purple">×${cnt}</span></div>
        <div class="si-desc">${sc.desc} / 基礎${sc.base}</div>
        <div class="si-price">${price}G</div>
      </div>
      <button class="btn btn-gold" onclick="buyScroll('${key}',${price})" ${S.gold<price?'disabled':''}>購入</button>
    </div>`;
  }

  let equipHtml = '';
  for (const [key, base] of Object.entries(EQUIPMENT_BASE).filter(([,b]) => b.rarity !== 'architect' && b.price > 0)) {
    const color = RARITY[base.rarity].color;
    let stats = [];
    if (base.baseHp) stats.push(`HP+${base.baseHp}前後`);
    if (base.baseLuk) stats.push(`LUK+${base.baseLuk}前後`);
    if (base.baseMult) stats.push(`魔法×${base.baseMult}前後`);
    equipHtml += `<div class="shop-item">
      <div class="si-info">
        <div class="si-name" style="color:${color}">${base.icon} ${base.name} <span class="tag" style="background:${color}22;color:${color}">${RARITY[base.rarity].name}</span> <span class="tag tag-gold">${base.slot}</span></div>
        <div class="si-desc">${stats.join(' / ')}（ランダム）</div>
        <div class="si-price">${base.price}G</div>
      </div>
      <button class="btn btn-gold" onclick="buyEquip('${key}')" ${S.gold < base.price ? 'disabled' : ''}>購入</button>
    </div>`;
  }

  document.getElementById('shop-screen').innerHTML = `
    <div class="panel"><div class="panel-title">🏪 ショップ（所持: ${S.gold}G）</div></div>
    <div class="section-title">🪨 召喚</div>
    <div class="shop-item">
      <div class="si-info">
        <div class="si-name">召契石</div>
        <div class="si-desc">契約の血と合成してペットを召喚</div>
        <div class="si-price">${SUMMON_STONE_PRICE}G</div>
      </div>
      <button class="btn btn-gold" onclick="buySummonStone()" ${S.gold < SUMMON_STONE_PRICE ? 'disabled' : ''}>購入</button>
    </div>
    <div class="section-title">📜 スクロール</div>
    ${scrollHtml}
    <div class="section-title">⚔️ 装備</div>
    ${equipHtml}
  `;
}

function buySummonStone() {
  if (S.gold < SUMMON_STONE_PRICE) return;
  S.gold -= SUMMON_STONE_PRICE;
  if (!S.summonStones) S.summonStones = 0;
  S.summonStones++;
  render();
}

function buyScroll(type, price) {
  if (S.gold < price) return;
  S.gold -= price; addScroll(type, 1); render();
}

function buyEquip(key) {
  const base = EQUIPMENT_BASE[key];
  if (!base || S.gold < base.price || base.price === 0) return;
  S.gold -= base.price; S.inventory.push(rollEquipStats(key)); render();
}

// ==================== BAZAAR ====================

function renderBazaar() {
  const npcItems = BAZAAR_NPC_SEED.map(item => ({ ...item, _isNpc: true }));
  const firestoreItems = (_bazItems || []);
  const all = [...npcItems, ...firestoreItems];

  const filterAttr = document.getElementById('baz-filter-attr')?.value || 'all';
  const filterOwned = document.getElementById('baz-filter-owned')?.value || 'all';
  const sortBy = document.getElementById('baz-sort')?.value || 'default';

  const grimoireItems = all.filter(item => item.grimoireRarity);
  let scrollItems = all.filter(item => !item.grimoireRarity && item.scrollType && SCROLLS[item.scrollType]);

  if (filterAttr !== 'all') scrollItems = scrollItems.filter(item => SCROLLS[item.scrollType].attr === filterAttr);
  if (filterOwned === 'owned') scrollItems = scrollItems.filter(item => countScrolls(item.scrollType) > 0);
  else if (filterOwned === 'unowned') scrollItems = scrollItems.filter(item => countScrolls(item.scrollType) === 0);
  if (sortBy === 'price_asc') scrollItems.sort((a,b) => a.price - b.price);
  else if (sortBy === 'price_desc') scrollItems.sort((a,b) => b.price - a.price);
  else if (sortBy === 'rarity') {
    const order = { common:0, rare:1, epic:2, legend:3, architect:4 };
    scrollItems.sort((a,b) => (order[SCROLLS[b.scrollType].rarity]||0) - (order[SCROLLS[a.scrollType].rarity]||0));
  }

  const isLoggedIn = !!window._fbUser;

  let grimoireHtml = '';
  if (grimoireItems.length > 0) {
    grimoireHtml = grimoireItems.map(item => {

async function postBazaar() {
  const sel = document.getElementById('baz-item-sel').value;
  const price = parseInt(document.getElementById('baz-price').value) || 1;
  if (!sel || sel === '') { alert('出品するアイテムを選択してください'); return; }

  let postData = {};
  if (sel.startsWith('grimoire:')) {
    const gIdx = parseInt(sel.split(':')[1]);
    if (!S.grimoires[gIdx]) return;
    const g = S.grimoires.splice(gIdx, 1)[0];
    postData = { grimoireRarity: g.rarity, qty: 1, price };
  } else {
    const type = sel.replace('scroll:', '');
    const qty = parseInt(document.getElementById('baz-qty').value) || 1;
    if (!type || countScrolls(type) < qty) { alert('スクロールが足りません'); return; }
    removeScrollByKey(type, qty);
    postData = { scrollType: type, qty, price };
  }

  const ok = await fbBazaarPost(postData);
  if (ok) {
    saveGame();
    const simEl = document.getElementById('baz-sim-result');
    if (simEl) simEl.textContent = '出品しました！Firestoreにリアルタイム反映されます';
  } else {
    // エラー時はアイテムを戻す
    if (postData.grimoireRarity) {
      S.grimoires.push({ rarity: postData.grimoireRarity });
    } else if (postData.scrollType) {
      for (let i = 0; i < postData.qty; i++) addScroll(postData.scrollType, 1);
    }
  }
  render();
}

// ==================== 行商人 ====================

function getMerchantSeed() { return Math.floor(Date.now() / (1000 * 60 * 60 * 12)); }
function seededRandom(seed) { let x = Math.sin(seed) * 10000; return x - Math.floor(x); }

function getMerchantStock() {
  const seed = getMerchantSeed();
  const allKeys = Object.keys(SCROLLS).filter(k => SCROLLS[k].rarity !== 'architect');
  const stock = []; const used = new Set();
  for (let i = 0; stock.length < 6; i++) {
    const idx = Math.floor(seededRandom(seed + i * 7919) * allKeys.length);
    const key = allKeys[idx];
    if (!used.has(key)) {
      used.add(key);
      const sc = SCROLLS[key];
      const basePrice = SCROLL_SHOP_PRICE[sc.rarity];
      const multi = 0.7 + seededRandom(seed + i * 1009) * 0.6;
      const price = Math.max(1, Math.floor(basePrice * multi));
      const qty = 1 + Math.floor(seededRandom(seed + i * 3571) * 4);
      stock.push({ key, price, qty });
    }
  }
  return stock;
}

function getMerchantNextReset() {
  const next = (getMerchantSeed() + 1) * 1000 * 60 * 60 * 12;
  const diff = next - Date.now();
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return `${h}時間${m}分後`;
}

function renderChat() {
  const stock = getMerchantStock();
  let itemHtml = stock.map((item, i) => {
    const sc = SCROLLS[item.key];
    const color = RARITY[sc.rarity].color;
    const fairPrice = SCROLL_SHOP_PRICE[sc.rarity];
    const isDiscount = item.price < fairPrice;
    const priceLabel = isDiscount
      ? `<span style="color:#2ecc71;font-weight:bold">${item.price}G</span> <span style="color:var(--text3);font-size:10px;text-decoration:line-through">${fairPrice}G</span>`
      : `<span style="color:#e67e22;font-weight:bold">${item.price}G</span>`;
    return `<div class="shop-item">
      <div class="si-info">
        <div class="si-name" style="color:${color}">${sc.icon} ${sc.name} <span class="tag" style="background:${color}22;color:${color}">${RARITY[sc.rarity].name}</span></div>
        <div class="si-desc">${sc.desc} / 基礎${sc.base}</div>
        <div class="si-price">${priceLabel} ×${item.qty}</div>
      </div>
      <button class="btn btn-gold" onclick="buyMerchantItem(${i})" ${S.gold < item.price ? 'disabled' : ''}>購入</button>
    </div>`;
  }).join('');

  document.getElementById('chat-screen').innerHTML = `
    <div class="panel">
      <div class="panel-title">🧝 行商人ミラル</div>
      <div style="color:var(--text2);font-size:12px">次の入れ替えまで: ${getMerchantNextReset()}</div>
    </div>
    ${itemHtml}
  `;
}

function buyMerchantItem(idx) {
  const stock = getMerchantStock();
  const item = stock[idx];
  if (!item || S.gold < item.price) return;
  S.gold -= item.price;
  for (let i = 0; i < item.qty; i++) addScroll(item.key, 1);
  render();
}

function renderScrolls() {
  const byAttr = { fire:[], ice:[], water:[], thunder:[] };
  S.scrollItems.forEach((item, idx) => {
    const sc = SCROLLS[item.key];
    if (sc) byAttr[sc.attr].push({ item, idx, sc });
  });

  const groups = {};
  S.scrollItems.forEach(item => {
    const gkey = `${item.key}_${item.lv}`;
    groups[gkey] = (groups[gkey] || 0) + 1;
  });

  const attrLabel = { fire:'🔥 火', ice:'❄️ 氷', water:'💧 水', thunder:'⚡ 雷' };
  let html = `<div class="panel"><div class="panel-title">📜 所持スクロール</div><div style="color:var(--text2);font-size:11px">同種・同Lv 3枚で合成 → Lv+1</div></div>`;

  for (const [attr, items] of Object.entries(byAttr)) {
    if (items.length === 0) continue;
    html += `<div class="section-title">${attrLabel[attr]}</div>`;
    const shown = new Set();
    items.forEach(({ item, sc }) => {
      const gkey = `${item.key}_${item.lv}`;
      if (shown.has(gkey)) return;
      shown.add(gkey);
      const cnt = groups[gkey];
      const color = RARITY[sc.rarity].color;
      const dmg = calcScrollDmg(item.key, item.lv);
      const canSynth = cnt >= 3 && item.lv < 10;
      const dmgAfter = canSynth ? calcScrollDmg(item.key, item.lv + 1) : null;
      const synthBorder = canSynth ? 'border-color:' + color + '66' : '';
      const dmgAfterHtml = canSynth ? ' → <span style="color:#2ecc71">' + dmgAfter + '</span>（合成後）' : '';
      const lvHtml = item.lv >= 10
        ? '<div style="color:var(--gold);font-size:11px">最大Lv</div>'
        : '<div style="color:var(--text3);font-size:11px">' + cnt + '/3枚</div>';
      const synthBtn = canSynth
        ? '<button class="btn btn-purple" onclick="synthesizeScroll(\'' + item.key + '\',' + item.lv + ')">合成</button>'
        : '';
      html += `<div class="shop-item" style="${synthBorder}">
        <div class="si-info">
          <div class="si-name" style="color:${color}">${sc.icon} ${sc.name}
            <span class="tag" style="background:${color}22;color:${color}">${RARITY[sc.rarity].name}</span>
            <span class="tag tag-gold">Lv${item.lv}</span>
            <span style="color:var(--text2);font-size:11px">×${cnt}</span>
          </div>
          <div class="si-desc">ダメージ: ${dmg}${dmgAfterHtml}</div>
          ${lvHtml}
        </div>
        ${synthBtn}
      </div>`;
    });
  }

  if (S.scrollItems.length === 0) html += '<div class="msg msg-info">所持スクロールなし</div>';

  if (!S.grimoires) S.grimoires = [];
  const eg = S.equipped.grimoire;
  html += '<div class="section-title">📖 空白の魔導書</div>';

  if (eg) {
    const g = GRIMOIRE[eg.rarity];
    const sc = SCROLLS[eg.scrollKey];
    const color = GRIMOIRE[eg.rarity].color;
    const dmg = Math.floor(calcScrollDmg(eg.scrollKey, eg.scrollLv || 1) * g.bulletMult);
    html += `<div class="panel" style="border-color:${color}44">
      <div style="color:${color};font-weight:bold">📖 ${g.name}（${RARITY[eg.rarity].name}）× ${sc ? sc.icon + sc.name : '?'} Lv${eg.scrollLv}</div>
      <div style="color:var(--text2);font-size:12px;margin-top:4px">魔弾ダメージ: ${dmg} / 倍率×${g.bulletMult}</div>
    </div>`;
  } else {
    html += '<div class="msg msg-info">魔導書未合成 — 魔弾はデフォルトダメージ</div>';
  }

  if (S.grimoires.length > 0) {
    html += '<div style="margin-top:8px">';
    S.grimoires.forEach((gItem, gIdx) => {
      const g = GRIMOIRE[gItem.rarity];
      const color = RARITY[gItem.rarity].color;
      const scrollOpts = S.scrollItems.map((sItem, sIdx) => {
        const sc = SCROLLS[sItem.key];
        return `<option value="${sIdx}">${sc.icon}${sc.name} Lv${sItem.lv}（${RARITY[sc.rarity].name}）</option>`;
      }).join('');
      html += `<div class="shop-item" style="border-color:${color}44;flex-direction:column;gap:6px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="color:${color};font-weight:bold">📖 ${g.name}（${RARITY[gItem.rarity].name}）× ${g.bulletMult}</div>
        </div>
        <div style="display:flex;gap:6px">
          <select id="grimoire-scroll-${gIdx}" style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:5px;color:var(--text);font-family:inherit;font-size:12px">
            ${scrollOpts || '<option>スクロールなし</option>'}
          </select>
          <button class="btn btn-purple" onclick="synthesizeGrimoire(${gIdx})" ${S.scrollItems.length === 0 ? 'disabled' : ''}>合成</button>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  document.getElementById('scrolls-screen').innerHTML = html;
}

function synthesizeGrimoire(gIdx) {
  if (!S.grimoires || !S.grimoires[gIdx]) return;
  const sel = document.getElementById(`grimoire-scroll-${gIdx}`);
  if (!sel) return;
  const sIdx = parseInt(sel.value);
  const sItem = S.scrollItems[sIdx];
  if (!sItem) return;
  S.scrollItems.splice(sIdx, 1);
  const gItem = S.grimoires.splice(gIdx, 1)[0];
  if (!S.equipped) S.equipped = { head:null, body:null, ring:null, grimoire:null };
  if (S.equipped.grimoire) S.inventory.push(S.equipped.grimoire);
  const newGrimoire = { type:'grimoire', rarity: gItem.rarity, scrollKey: sItem.key, scrollLv: sItem.lv };
  S.equipped.grimoire = newGrimoire;
  saveGame(); renderScrolls();
}

function synthesizeScroll(key, lv) {
  let removed = 0;
  S.scrollItems = S.scrollItems.filter(item => {
    if (item.key === key && item.lv === lv && removed < 3) { removed++; return false; }
    return true;
  });
  if (removed === 3) S.scrollItems.push({ key, lv: lv + 1 });
  saveGame(); renderScrolls();
}

// ==================== 召喚 ====================

function renderSummon() {
  if (!S.contractBloods) S.contractBloods = {};
  if (!S.pets) S.pets = [];
  if (!S.activePets) S.activePets = [];
  const typeLabel = { attack:'攻撃型', magic:'魔法型', heal:'回復型', tank:'タンク型' };
  const typeColor = { attack:'#e74c3c', magic:'#9b59b6', heal:'#2ecc71', tank:'#3498db' };

  const bloods = Object.entries(S.contractBloods).filter(([,v]) => v > 0);
  let summonHtml = '';
  bloods.forEach(([mKey, cnt]) => {
    const m = MONSTERS[mKey]; if (!m) return;
    const hasPet = S.pets.some(p => p.mKey === mKey);
    const color = typeColor[m.petType];
    summonHtml += `<div class="shop-item" style="border-color:${color}44">
      <div class="si-info">
        <div style="font-weight:bold">${m.icon} 契約の血：${m.name} <span style="color:var(--text2)">×${cnt}</span></div>
        <div style="color:${color};font-size:11px">${typeLabel[m.petType]}</div>
        <div style="color:var(--text2);font-size:11px">召契石1個（${SUMMON_STONE_PRICE}G）+ 血1枚</div>
      </div>
      <button class="btn btn-purple" onclick="summonPet('${mKey}')"
        ${hasPet || !S.summonStones || S.summonStones < 1 || cnt < 1 ? 'disabled' : ''}>
        ${hasPet ? '召喚済' : '召喚'}
      </button>
    </div>`;
  });

  let petsHtml = '';
  S.pets.forEach((pet, idx) => {
    const m = MONSTERS[pet.mKey]; if (!m) return;
    const ps = petStats(pet.mKey, pet.lv);
    const color = typeColor[m.petType];
    const isActive = S.activePets.includes(idx);
    const cost = petLvUpCost(pet.lv);
    const bloodCount = S.contractBloods[pet.mKey] || 0;
    const canLvUp = pet.lv < 100 && bloodCount >= cost;
    const hp = pet.currentHp !== undefined ? pet.currentHp : ps.hp;
    petsHtml += `<div class="shop-item" style="border-color:${isActive ? color : 'var(--border)'}88;${isActive ? 'background:' + color + '11' : ''}">
      <div class="si-info">
        <div style="font-weight:bold;color:${color}">${m.icon} ${m.name} <span style="color:var(--gold)">Lv${pet.lv}</span>${isActive ? ' <span class="tag tag-purple">出撃中</span>' : ''}</div>
        <div style="color:var(--text2);font-size:11px">${typeLabel[m.petType]} / HP:${hp}/${ps.hp} ATK:${ps.atk}</div>
        <div style="color:var(--text3);font-size:11px">LvUp: 血×${cost}枚 (所持${bloodCount})</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button class="btn ${isActive ? 'btn-red' : 'btn-gold'}" style="font-size:11px;padding:3px 7px"
          onclick="toggleActivePet(${idx})" ${!isActive && S.activePets.length >= 3 ? 'disabled' : ''}>
          ${isActive ? '外す' : '出撃'}
        </button>
        <button class="btn btn-purple" style="font-size:11px;padding:3px 7px"
          onclick="levelUpPet(${idx})" ${!canLvUp ? 'disabled' : ''}>強化</button>
      </div>
    </div>`;
  });

  document.getElementById('summon-screen').innerHTML = `
    <div class="panel">
      <div class="panel-title">🐾 召喚（出撃: ${S.activePets.length}/3）</div>
      <div style="color:var(--text2);font-size:12px">所持GOLD: ${S.gold}G / 召契石: ${S.summonStones || 0}個</div>
    </div>
    ${bloods.length > 0 ? '<div class="section-title">🩸 召喚可能</div>' + summonHtml : ''}
    ${S.pets.length > 0 ? '<div class="section-title">🐾 所持ペット</div>' + petsHtml : ''}
    ${bloods.length === 0 && S.pets.length === 0 ? '<div class="msg msg-info">契約の血をドロップするとここに表示されます（ドロップ率1%）</div>' : ''}
  `;
}

function summonPet(mKey) {
  if (!S.contractBloods) S.contractBloods = {};
  if (!S.pets) S.pets = [];
  if (!S.summonStones || S.summonStones < 1) return;
  if (!S.contractBloods[mKey] || S.contractBloods[mKey] < 1) return;
  if (S.pets.some(p => p.mKey === mKey)) return;
  S.summonStones--; S.contractBloods[mKey]--;
  const ps = petStats(mKey, 1);
  S.pets.push({ mKey, lv: 1, currentHp: ps.hp });
  render();
}

function levelUpPet(idx) {
  if (!S.pets || !S.pets[idx]) return;
  const pet = S.pets[idx];
  const cost = petLvUpCost(pet.lv);
  if (!S.contractBloods) S.contractBloods = {};
  if ((S.contractBloods[pet.mKey] || 0) < cost) return;
  if (pet.lv >= 100) return;
  S.contractBloods[pet.mKey] -= cost; pet.lv++;
  const ps = petStats(pet.mKey, pet.lv);
  pet.currentHp = ps.hp;
  render();
}

function toggleActivePet(idx) {
  if (!S.activePets) S.activePets = [];
  const pos = S.activePets.indexOf(idx);
  if (pos >= 0) { S.activePets.splice(pos, 1); }
  else {
    if (S.activePets.length >= 3) return;
    S.activePets.push(idx);
    const pet = S.pets[idx];
    if (pet) { const ps = petStats(pet.mKey, pet.lv); pet.currentHp = ps.hp; }
  }
  render();
}
