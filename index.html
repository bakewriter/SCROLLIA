    const item = S.equipped[slot];
    if (slot === 'grimoire') {
      if (!item) return `<div class="equip-slot"><div><span class="es-slot">魔導書</span> <span class="es-item">─ 未装備</span></div><button class="btn btn-gold es-btn" onclick="openGrimoireEquipModal()">変更</button></div>`;
      const color = RARITY[item.rarity].color;
      const sc = SCROLLS[item.scrollKey];
      const attr = sc ? {fire:'🔥火',ice:'❄️氷',water:'💧水',thunder:'⚡雷'}[sc.attr] : '?';
      return `<div class="equip-slot"><div><span class="es-slot">魔導書</span><span class="es-item" style="color:${color}">📖 ${RARITY[item.rarity].name} ${attr} Lv${item.scrollLv}</span><span style="color:var(--text2);font-size:11px"> (×${GRIMOIRE[item.rarity].bulletMult})</span></div><div style="display:flex;gap:4px"><button class="btn btn-gold es-btn" onclick="openGrimoireEquipModal()">変更</button><button class="btn btn-red es-btn" onclick="unequipGrimoire()">外す</button></div></div>`;
    }
    const base = item ? (EQUIPMENT_BASE[item.baseKey] || SERIES_EQUIP[item.baseKey]) : null;
    let stats = [];
    if (item) {
      if (item.hp) stats.push(`HP+${item.hp}`);
      if (item.luk) stats.push(`LUK+${item.luk}`);
      if (item.mult && item.mult > 0) stats.push(`魔法×${item.mult}`);
    }
    const color = base ? RARITY[base.rarity].color : 'var(--text3)';
    const slotBtn = item
      ? `<button class="btn btn-red es-btn" onclick="unequip('${slot}')">外す</button>`
      : `<button class="btn btn-gold es-btn" onclick="openEquipModal('${slot}')">変更</button>`;
    return `<div class="equip-slot"><div><span class="es-slot">${slot}</span><span class="es-item" style="color:${color}">${base ? base.icon + ' ' + base.name : '─ 未装備'}</span>${stats.length ? '<span style="color:var(--text2);font-size:11px"> (' + stats.join('/') + ')</span>' : ''}</div>${slotBtn}</div>`;
  }).join('');

  let inventoryRows = '';
  if (S.inventory.length > 0) {
    inventoryRows = S.inventory.map((item, idx) => {
      if (!item) return '';
      if (item.type === 'grimoire') {
        const color = RARITY[item.rarity].color;
        const sc = SCROLLS[item.scrollKey];
        const attr = sc ? {fire:'🔥火',ice:'❄️氷',water:'💧水',thunder:'⚡雷'}[sc.attr] : '?';
        return `<div class="shop-item" style="border-color:${color}44"><div class="si-info"><div style="font-weight:bold;color:${color}">📖 空白の魔導書 <span class="tag" style="background:${color}22;color:${color}">${RARITY[item.rarity].name}</span></div><div style="color:var(--text2);font-size:11px">${attr} Lv${item.scrollLv} / 魔弾×${GRIMOIRE[item.rarity].bulletMult}</div></div><button class="btn btn-gold" style="font-size:11px;padding:3px 7px" onclick="equipGrimoireFromInventory(${idx})">装備</button></div>`;
      }
      if (!item.baseKey) return '';
      const base = (EQUIPMENT_BASE[item.baseKey] || SERIES_EQUIP[item.baseKey]);
      if (!base) return '';
      const color = RARITY[base.rarity].color;
      let stats = [];
      if (item.hp) stats.push(`HP+${item.hp}`);
      if (item.luk) stats.push(`LUK+${item.luk}`);
      if (item.mult && item.mult > 0) stats.push(`魔法×${item.mult}`);
      const sellPrice = Math.floor(base.price * 0.4);
      return `<div class="shop-item"><div class="si-info"><div style="font-weight:bold;color:${color}">${base.icon} ${base.name} <span class="tag" style="background:${color}22;color:${color}">${RARITY[base.rarity].name}</span></div><div style="color:var(--text2);font-size:11px">${stats.join(' / ')}</div></div><div style="display:flex;flex-direction:column;gap:4px"><button class="btn btn-gold" style="font-size:11px;padding:3px 7px" onclick="equipFromInventory(${idx})">装備</button><button class="btn btn-red" style="font-size:11px;padding:3px 7px" onclick="sellInventoryItem(${idx})">売却 ${sellPrice}G</button></div></div>`;
    }).join('');
  }

  let scrollRows = S.scrollItems.map(item => {
    const sc = SCROLLS[item.key]; if (!sc) return '';
    const color = RARITY[sc.rarity].color;
    return `<div class="stat-row"><span class="sr-label" style="color:${color}">${sc.icon} ${sc.name} <span style="color:var(--gold)">Lv${item.lv}</span></span><span class="sr-value" style="color:${color}">${RARITY[sc.rarity].name}</span></div>`;
  }).join('');

  document.getElementById('status-screen').innerHTML = `
    <div class="panel">
      <div class="panel-title">📜 ステータス</div>
      <div class="stat-row"><span class="sr-label">レベル</span><span class="sr-value">${S.lv}</span></div>
      <div class="stat-row"><span class="sr-label">EXP</span><span class="sr-value">${S.exp} / ${expNeeded()}</span></div>
      <div style="background:#1a0a0a;border-radius:3px;height:6px;overflow:hidden;margin:4px 0 8px">
        <div style="width:${expBar}%;height:100%;background:linear-gradient(90deg,var(--purple),var(--purple2))"></div>
      </div>
      <div class="stat-row"><span class="sr-label">HP</span><span class="sr-value">${S.currentHp} / ${ef.hp}</span></div>
      <div class="stat-row"><span class="sr-label">LUK</span><span class="sr-value">${ef.luk}</span></div>
      <div class="stat-row"><span class="sr-label">GOLD</span><span class="sr-value">${S.gold}G</span></div>
      <div class="stat-row"><span class="sr-label">💎 Gems</span><span class="sr-value">${S.gems}</span></div>
    </div>
    <div class="section-title">⚔️ 装備中</div>
    ${equipRows}
    ${(() => {
      const bonuses = getSeriesBonus();
      const entries = Object.entries(bonuses);
      if (entries.length === 0) return '';
      const lines = entries.map(([eff, val]) => {
        const label = {thunder_boost:'雷属性',ice_boost:'氷属性',all_boost:'全属性',boss_boost:'BOSS特攻',exp_boost:'経験値',tank_pet_boost:'タンクペット'}[eff] || eff;
        return `<span style="color:${RARITY['legend'].color}">${label}+${Math.round(val*100)}%</span>`;
      }).join('　');
      return '<div class="panel" style="border-color:' + RARITY['legend'].color + '44;font-size:12px">✨ セット効果: ' + lines + '</div>';
    })()}
    <div class="section-title">🎒 インベントリ</div>
    <div class="panel">${inventoryRows || '<div style="color:var(--text3)">装備品なし</div>'}</div>
    <div class="section-title">📜 所持スクロール</div>
    <div class="panel">${scrollRows || '<div style="color:var(--text3)">スクロールなし</div>'}</div>
    <div class="section-title">⚙️ システム</div>
    <div class="flex-end"><button class="btn btn-red" onclick="resetGame()">データ消去</button></div>
  `;
}

function unequip(slot) {
  const item = S.equipped && S.equipped[slot];
  if (item) S.inventory.push(item);
  if (!S.equipped) S.equipped = { head:null, body:null, ring:null };
  S.equipped[slot] = null; render();
}

function equipFromInventory(idx) {
  const item = S.inventory[idx];
  if (!item || !item.baseKey) return;
  const base = (EQUIPMENT_BASE[item.baseKey] || SERIES_EQUIP[item.baseKey]);
  if (!base) return;
  if (!S.equipped) S.equipped = { head:null, body:null, ring:null };
  if (S.equipped[base.slot]) S.inventory.push(S.equipped[base.slot]);
  S.equipped[base.slot] = item;
  S.inventory.splice(idx, 1); render();
}

function sellInventoryItem(idx) {
  const item = S.inventory[idx]; if (!item) return;
  const base = item.baseKey ? (EQUIPMENT_BASE[item.baseKey] || SERIES_EQUIP[item.baseKey]) : null;
  const sellPrice = base ? Math.floor(base.price * 0.4) : 10;
  S.inventory.splice(idx, 1);
  S.gold += Math.max(1, sellPrice); render();
}

function openEquipModal(slot) {
  if (!S.equipped) S.equipped = { head:null, body:null, ring:null };
  const items = S.inventory.map((item, idx) => ({ item, idx }))
    .filter(({ item }) => item && item.baseKey && (EQUIPMENT_BASE[item.baseKey] || SERIES_EQUIP[item.baseKey]) && (EQUIPMENT_BASE[item.baseKey] || SERIES_EQUIP[item.baseKey]).slot === slot);
  document.getElementById('equip-modal-title').textContent = `${slot} 装備選択`;
  if (items.length === 0) {
    document.getElementById('equip-modal-list').innerHTML = '<div style="color:var(--text3)">インベントリに該当装備なし</div>';
  } else {
    document.getElementById('equip-modal-list').innerHTML = items.map(({ item, idx }) => {
      const base = (EQUIPMENT_BASE[item.baseKey] || SERIES_EQUIP[item.baseKey]);
      const color = RARITY[base.rarity].color;
      let stats = [];
      if (item.hp) stats.push(`HP+${item.hp}`);
      if (item.luk) stats.push(`LUK+${item.luk}`);
      if (item.mult && item.mult > 0) stats.push(`魔法×${item.mult}`);
      return `<div class="shop-item" style="margin-bottom:6px"><div class="si-info"><div style="font-weight:bold;color:${color}">${base.icon} ${base.name} <span class="tag" style="background:${color}22;color:${color}">${RARITY[base.rarity].name}</span></div><div style="color:var(--text2);font-size:11px">${stats.join(' / ')}</div></div><button class="btn btn-gold" style="font-size:11px;padding:4px 8px" onclick="equipFromInventory(${idx});closeEquipModal()">装備</button></div>`;
    }).join('');
  }
  document.getElementById('equip-modal').classList.add('show');
}

function unequipGrimoire() {
  if (!S.equipped) return;
  const item = S.equipped.grimoire;
  if (item) S.inventory.push(item);
  S.equipped.grimoire = null; render();
}

function equipGrimoireFromInventory(idx) {
  const item = S.inventory[idx];
  if (!item || item.type !== 'grimoire') return;
  if (!S.equipped) S.equipped = { head:null, body:null, ring:null, grimoire:null };
  if (S.equipped.grimoire) S.inventory.push(S.equipped.grimoire);
  S.equipped.grimoire = item;
  S.inventory.splice(idx, 1); render();
}

function openGrimoireEquipModal() {
  const items = S.inventory.map((item, idx) => ({ item, idx })).filter(({ item }) => item && item.type === 'grimoire');
  document.getElementById('equip-modal-title').textContent = '魔導書 装備選択';
  if (items.length === 0) {
    document.getElementById('equip-modal-list').innerHTML = '<div style="color:var(--text3)">インベントリに魔導書なし</div>';
  } else {
    document.getElementById('equip-modal-list').innerHTML = items.map(({ item, idx }) => {
      const color = RARITY[item.rarity].color;
      const sc = SCROLLS[item.scrollKey];
      const attr = sc ? {fire:'🔥火',ice:'❄️氷',water:'💧水',thunder:'⚡雷'}[sc.attr] : '?';
      return `<div class="shop-item" style="margin-bottom:6px"><div class="si-info"><div style="font-weight:bold;color:${color}">📖 空白の魔導書 <span class="tag" style="background:${color}22;color:${color}">${RARITY[item.rarity].name}</span></div><div style="color:var(--text2);font-size:11px">${attr} Lv${item.scrollLv} / ×${GRIMOIRE[item.rarity].bulletMult}</div></div><button class="btn btn-gold" style="font-size:11px;padding:4px 8px" onclick="equipGrimoireFromInventory(${idx});closeEquipModal()">装備</button></div>`;
    }).join('');
  }
  document.getElementById('equip-modal').classList.add('show');
}

function closeEquipModal() { document.getElementById('equip-modal').classList.remove('show'); }
function equipItem(idx) { equipFromInventory(idx); closeEquipModal(); }

// ==================== STORE ====================

const Backend = {
  async redeemCode(code) {
    const used = JSON.parse(localStorage.getItem('scrollia_used_codes') || '[]');
    if (used.includes(code)) return { ok: false, msg: 'このコードは使用済みです' };
    const gems = SERIAL_CODES[code];
    if (!gems) return { ok: false, msg: '無効なコードです' };
    used.push(code);
    localStorage.setItem('scrollia_used_codes', JSON.stringify(used));
    return { ok: true, gems };
  }
};

function renderStore() {
  document.getElementById('store-screen').innerHTML = `
    <div class="panel">
      <div class="panel-title">💎 Gemsストア</div>
      <div style="text-align:center;padding:10px 0">
        <div style="font-size:32px;color:var(--gold);font-weight:bold">💎 ${S.gems}</div>
        <div style="color:var(--text2);font-size:12px;margin-top:4px">現在のGems残高</div>
      </div>
    </div>
    <div class="section-title">🎫 シリアルコード</div>
    <div class="panel">
      <div style="color:var(--text2);font-size:12px;margin-bottom:8px">BOOTHで購入したシリアルコードを入力してください</div>
      <div class="code-input-wrap">
        <input type="text" id="code-input" placeholder="XXXXXX-XXXX" style="text-transform:uppercase">
        <button class="btn btn-gold" onclick="redeemCode()">使用</button>
      </div>
      <div id="code-result"></div>
    </div>
    <div class="section-title">💎 Gems商品</div>
    <div class="placeholder-item">🚧 準備中（近日公開予定）</div>
    <div class="placeholder-item">🚧 準備中（近日公開予定）</div>
  `;
}

async function redeemCode() {
  const code = (document.getElementById('code-input').value || '').trim().toUpperCase();
  if (!code) return;
  const res = await Backend.redeemCode(code);
  const el = document.getElementById('code-result');
  if (res.ok) {
    S.gems += res.gems;
    el.innerHTML = `<div class="msg msg-success">💎 ${res.gems} Gems獲得！</div>`;
    render();
  } else {
    el.innerHTML = `<div class="msg msg-err">${res.msg}</div>`;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

Object.assign(window, {

});

loadGame();
